# ============================================================================
# 自动构建并推送 Docker 镜像到 GitHub Container Registry (GHCR)
# ----------------------------------------------------------------------------
# 触发条件:
#   - push 到 master 分支
#   - 打 tag (v*)
#   - 手动触发 (workflow_dispatch)
#
# 镜像地址: ghcr.io/ikun5200/mimi3:latest
#           ghcr.io/ikun5200/mimi3:<git-sha>
#           ghcr.io/ikun5200/mimi3:<tag>
#
# 首次使用必读:
#   1. 把本文件放到仓库的 .github/workflows/ 目录下
#   2. 仓库 Settings -> Actions -> General -> Workflow permissions
#      勾选 "Read and write permissions" 并保存
#   3. 镜像默认是 private，首次推送后:
#      访问 https://github.com/users/ikun5200/packages/container/mimi3/settings
#      在 Danger Zone 把 Package visibility 改成 Public
#      （这样 CasaOS 拉取镜像时不用登录）
# ============================================================================

name: Build and Push Docker Image

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "### Image pushed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
